<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baybay Leyte Pigeon Clocking System</title>
<meta name="description" content="Multi-lap pigeon clocking system with admin and member views, live sync, distance & speed calculation.">
<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: auto; padding: 20px; }
h1,h2 { text-align: center; }
input, select, button { margin: 5px 0; padding: 5px; width: 100%; }
table { width: 100%; margin-top: 20px; border-collapse: collapse; }
th, td { border: 1px solid #ccc; padding: 5px; text-align: left; }
.admin-panel, .member-panel { border: 1px solid #aaa; padding: 10px; margin-top: 20px; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<h1>Baybay Leyte Pigeon Clocking System</h1>

<div class="admin-panel">
<h2>Admin Panel</h2>
<label>Start New Lap:</label>
<button onclick="startNewLap()">Start New Lap</button>

<label>Release Point Latitude:</label>
<input type="text" id="adminReleaseLat" placeholder="e.g., 11.248">
<label>Release Point Longitude:</label>
<input type="text" id="adminReleaseLng" placeholder="e.g., 124.940">
<button onclick="setReleasePoint()">Set Release Point</button>

<h3>Manage Members</h3>
<input type="text" id="newMemberName" placeholder="Member Name">
<input type="text" id="newMemberLoft" placeholder="Member Loft">
<button onclick="addMember()">Add Member</button>
<select id="membersList"></select>
<button onclick="removeMember()">Remove Selected Member</button>
</div>

<div class="member-panel">
<h2>Member Panel</h2>
<label>Select Your Member ID:</label>
<select id="memberIdSelect"></select>

<label>Ring Number:</label>
<input type="text" id="memberRing" placeholder="Enter ring number">
<label>Sticker:</label>
<input type="text" id="memberSticker" placeholder="Enter sticker info">
<label>Arrival Time:</label>
<input type="text" id="arrivalTime" readonly>
<button onclick="submitMemberEntry()">Submit Entry</button>

<h3>Current Lap Results</h3>
<select id="lapSelect" onchange="switchLap()"></select>
<table id="entriesTable">
<thead>
<tr>
<th>Ring</th><th>Sticker</th><th>Member</th><th>Loft</th><th>Arrival</th><th>Distance (km)</th><th>Speed (km/h)</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
// ===== Firebase config =====
const firebaseConfig = {
  apiKey: "AIzaSyC3oLOFmn3OdYAdcSsHTWV4kQnejV8gx-0",
  authDomain: "blpf-pigeon-tracker.firebaseapp.com",
  databaseURL: "https://blpf-pigeon-tracker-default-rtdb.firebaseio.com",
  projectId: "blpf-pigeon-tracker",
  storageBucket: "blpf-pigeon-tracker.appspot.com",
  messagingSenderId: "203553095076",
  appId: "1:203553095076:web:67d73be281ff39dff45531"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Admin Variables
let currentLapId = null;
let members = {};

// Auto fill arrival time
function updateArrivalTime(){
  document.getElementById('arrivalTime').value = new Date().toISOString();
}
setInterval(updateArrivalTime, 1000);
updateArrivalTime();

// Haversine formula
function getDistanceKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

// Admin Functions
function startNewLap(){
  const newLap = db.ref('laps').push({releasePoint:{lat:0,lng:0}, entries:{}});
  currentLapId = newLap.key;
  alert("New lap started: " + currentLapId);
  loadLaps();
}

function setReleasePoint(){
  const lat = parseFloat(document.getElementById('adminReleaseLat').value);
  const lng = parseFloat(document.getElementById('adminReleaseLng').value);
  if(currentLapId && !isNaN(lat) && !isNaN(lng)){
    db.ref(`laps/${currentLapId}/releasePoint`).set({lat,lng});
    alert("Release point set!");
  }
}

function addMember(){
  const name = document.getElementById('newMemberName').value.trim();
  const loft = document.getElementById('newMemberLoft').value.trim();
  if(name && loft){
    const memberRef = db.ref('members').push({name, loft});
    members[memberRef.key] = {name, loft};
    updateMemberDropdowns();
  }
}

function removeMember(){
  const select = document.getElementById('membersList');
  const key = select.value;
  if(key) db.ref(`members/${key}`).remove();
}

// Member Functions
function submitMemberEntry(){
  const memberId = document.getElementById('memberIdSelect').value;
  const ring = document.getElementById('memberRing').value.trim();
  const sticker = document.getElementById('memberSticker').value.trim();
  const arrivalTime = document.getElementById('arrivalTime').value;

  if(!memberId || !ring || !sticker || !currentLapId) return;

  db.ref(`laps/${currentLapId}/releasePoint`).once('value').then(snapshot=>{
    const rp = snapshot.val();
    const member = members[memberId];
    const distance = getDistanceKm(rp.lat,rp.lng,member.loftLat||member.loft.lat, member.loftLng||member.loft.lng);
    const speed = 0; // optional: calculate if release time recorded
    db.ref(`laps/${currentLapId}/entries`).push({
      ring, sticker, memberId, memberName: member.name, loft: member.loft,
      arrivalTime, distanceKm: distance.toFixed(2), speedKmh: speed
    });
    document.getElementById('memberRing').value='';
    document.getElementById('memberSticker').value='';
  });
}

// Load members & laps
db.ref('members').on('value', snapshot=>{
  members = snapshot.val() || {};
  updateMemberDropdowns();
});

function updateMemberDropdowns(){
  const select = document.getElementById('memberIdSelect');
  const list = document.getElementById('membersList');
  select.innerHTML=''; list.innerHTML='';
  for(let key in members){
    const option = document.createElement('option'); option.value=key; option.text=members[key].name;
    select.appendChild(option);
    const option2 = document.createElement('option'); option2.value=key; option2.text=members[key].name;
    list.appendChild(option2);
  }
}

// Load laps
function loadLaps(){
  db.ref('laps').on('value', snapshot=>{
    const laps = snapshot.val() || {};
    const lapSelect = document.getElementById('lapSelect');
    lapSelect.innerHTML='';
    for(let key in laps){
      const opt = document.createElement('option'); opt.value=key; opt.text=key; lapSelect.appendChild(opt);
      if(!currentLapId) currentLapId = key;
    }
    loadEntries();
  });
}
loadLaps();

// Load entries for current lap
function loadEntries(){
  if(!currentLapId) return;
  db.ref(`laps/${currentLapId}/entries`).on('value', snapshot=>{
    const entries = snapshot.val() || {};
    const tbody = document.querySelector('#entriesTable tbody');
    tbody.innerHTML='';
    for(let k in entries){
      const e = entries[k];
      const tr = document.createElement('tr');
      tr.innerHTML=`<td>${e.ring}</td><td>${e.sticker}</td><td>${e.memberName}</td><td>${e.loft}</td><td>${e.arrivalTime}</td><td>${e.distanceKm}</td><td>${e.speedKmh}</td>`;
      tbody.appendChild(tr);
    }
  });
}

// Switch lap
function switchLap(){
  const lapSelect = document.getElementById('lapSelect');
  currentLapId = lapSelect.value;
  loadEntries();
}
</script>
</body>
</html>
